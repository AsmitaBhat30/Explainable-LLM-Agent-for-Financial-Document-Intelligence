<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Demo — Explainable LLM Agent for Financial Document Intelligence</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #060F1C;
  --panel:    #0C1E33;
  --panel2:   #0A1929;
  --border:   #18334F;
  --text:     #C8DCF0;
  --muted:    #4E7094;
  --dim:      #2A4460;
  --accent:   #3B9EFF;
  --green:    #22C55E;
  --amber:    #F59E0B;
  --red:      #F87171;
  --mono: 'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
  --sans: -apple-system,'Segoe UI',system-ui,sans-serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

/* ── Top bar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem;
  height: 48px;
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
  position: sticky; top: 0; z-index: 10;
}

.brand {
  display: flex; align-items: center; gap: 0.6rem;
  font-size: 0.8rem; font-weight: 600; letter-spacing: -0.01em;
  color: var(--text);
}

.brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

.live-badge {
  display: flex; align-items: center; gap: 0.4rem;
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--green);
  padding: 0.2em 0.65em;
  border: 1px solid color-mix(in srgb, var(--green) 35%, transparent);
  border-radius: 3px;
  background: color-mix(in srgb, var(--green) 8%, transparent);
}

.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.topbar-right {
  display: flex; align-items: center; gap: 1.5rem;
  font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
  letter-spacing: 0.04em;
}

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  height: calc(100vh - 48px);
  overflow: hidden;
}

/* ── Left panel ── */
.left {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.query-area {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
  flex-shrink: 0;
}

.query-label {
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem;
}

.query-box {
  display: flex; align-items: flex-start; gap: 0.6rem;
}

.prompt-sym {
  font-family: var(--mono); font-size: 0.85rem; color: var(--accent);
  padding-top: 0.05rem; flex-shrink: 0;
}

#query-text {
  font-family: var(--mono); font-size: 0.82rem; line-height: 1.5;
  color: var(--text); flex: 1; min-height: 1.3em;
}

.cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--accent); vertical-align: text-bottom;
  animation: blink 0.9s step-end infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* Response stream */
.response-area {
  flex: 1; overflow-y: auto; padding: 1.5rem;
  display: flex; flex-direction: column; gap: 1.25rem;
}

.response-area::-webkit-scrollbar { width: 4px; }
.response-area::-webkit-scrollbar-track { background: transparent; }
.response-area::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.status-row {
  display: flex; align-items: center; gap: 0.6rem;
  font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
}

.status-icon {
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; flex-shrink: 0;
}

.status-icon.spinner {
  border: 1.5px solid var(--dim); border-top-color: var(--accent);
  animation: spin 0.7s linear infinite; background: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.status-icon.done { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); font-size: 0.65rem; }
.status-icon.warn { background: color-mix(in srgb, var(--amber) 15%, transparent); color: var(--amber); font-size: 0.65rem; }

.answer-block {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 6px; padding: 1.1rem 1.25rem;
}

.answer-label {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem;
}

#answer-text {
  font-size: 0.83rem; line-height: 1.7; color: var(--text);
  min-height: 2em;
}

.citations {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  margin-top: 1rem; padding-top: 0.9rem;
  border-top: 1px solid var(--border);
}

.cite-chip {
  font-family: var(--mono); font-size: 0.62rem;
  padding: 0.22em 0.6em; border-radius: 3px;
  background: color-mix(in srgb, var(--accent) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
  color: var(--accent);
  opacity: 0; transform: translateY(4px);
  transition: opacity 0.3s, transform 0.3s;
}

.cite-chip.visible { opacity: 1; transform: translateY(0); }

.review-flag {
  display: inline-flex; align-items: center; gap: 0.35rem;
  font-family: var(--mono); font-size: 0.62rem;
  padding: 0.22em 0.7em; border-radius: 3px;
  background: color-mix(in srgb, var(--amber) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--amber) 30%, transparent);
  color: var(--amber);
  opacity: 0; transition: opacity 0.3s;
}
.review-flag.visible { opacity: 1; }

/* ── Right panel — agent log ── */
.right {
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--panel2);
}

.panel-header {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 0.62rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  flex-shrink: 0;
}

/* Agent stages */
.agents {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 0.6rem;
  flex-shrink: 0;
}

.agent-row {
  display: flex; align-items: center; gap: 0.65rem;
  padding: 0.6rem 0.75rem; border-radius: 5px;
  border: 1px solid transparent;
  transition: border-color 0.3s, background 0.3s;
}

.agent-row.idle { border-color: var(--border); background: transparent; }
.agent-row.active { border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 6%, transparent); }
.agent-row.done  { border-color: color-mix(in srgb, var(--green) 30%, transparent); background: color-mix(in srgb, var(--green) 5%, transparent); }

.agent-indicator {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--dim); transition: background 0.3s;
}
.agent-row.active .agent-indicator { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
.agent-row.done  .agent-indicator { background: var(--green); animation: none; }

.agent-name {
  font-family: var(--mono); font-size: 0.72rem; color: var(--text); flex: 1;
  transition: color 0.3s;
}
.agent-row.idle .agent-name { color: var(--muted); }

.agent-time {
  font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
}
.agent-row.active .agent-time { color: var(--accent); }
.agent-row.done  .agent-time { color: var(--green); }

/* Log stream */
.log-area {
  flex: 1; overflow-y: auto; padding: 0.75rem 1rem;
  font-family: var(--mono); font-size: 0.67rem; line-height: 1.7;
}

.log-area::-webkit-scrollbar { width: 3px; }
.log-area::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.log-line {
  display: flex; gap: 0.6rem; align-items: baseline;
  opacity: 0; transform: translateY(3px);
  transition: opacity 0.25s, transform 0.25s;
}
.log-line.visible { opacity: 1; transform: translateY(0); }

.log-ts { color: var(--dim); flex-shrink: 0; }
.log-tag { flex-shrink: 0; }
.log-tag.retriever { color: var(--accent); }
.log-tag.compliance { color: #A78BFA; }
.log-tag.explanation { color: #34D399; }
.log-tag.audit { color: var(--amber); }
.log-msg { color: var(--muted); }
.log-val { color: var(--text); }

/* Progress bar */
.progress-wrap {
  padding: 0.6rem 1rem;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.progress-label {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 0.6rem; color: var(--muted);
  margin-bottom: 0.35rem;
}

.progress-bar-bg {
  height: 3px; background: var(--dim); border-radius: 2px; overflow: hidden;
}

.progress-bar-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  width: 0%; transition: width 0.4s ease;
}

/* Scenario counter */
.scenario-dots {
  display: flex; justify-content: center; gap: 0.4rem;
  padding: 0.6rem 1rem;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.s-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--dim); transition: background 0.3s;
}
.s-dot.active { background: var(--accent); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    Explainable LLM Agent · Financial Document Intelligence
  </div>
  <div class="topbar-right">
    <span>FastAPI :8000</span>
    <span>FAISS IVF · 8 domains</span>
    <div class="live-badge"><div class="live-dot"></div>Live Demo</div>
  </div>
</div>

<!-- Main layout -->
<div class="layout">

  <!-- Left: query + response -->
  <div class="left">
    <div class="query-area">
      <div class="query-label">Query</div>
      <div class="query-box">
        <span class="prompt-sym">&gt;</span>
        <div id="query-text"><span class="cursor"></span></div>
      </div>
    </div>

    <div class="response-area" id="response-area">
      <div class="status-row" id="status-retriever" style="display:none">
        <div class="status-icon spinner" id="icon-retriever"></div>
        <span id="msg-retriever"></span>
      </div>
      <div class="status-row" id="status-compliance" style="display:none">
        <div class="status-icon spinner" id="icon-compliance"></div>
        <span id="msg-compliance"></span>
      </div>
      <div class="status-row" id="status-explanation" style="display:none">
        <div class="status-icon spinner" id="icon-explanation"></div>
        <span id="msg-explanation"></span>
      </div>

      <div class="answer-block" id="answer-block" style="display:none">
        <div class="answer-label">Response</div>
        <div id="answer-text"></div>
        <div class="citations" id="citations"></div>
      </div>

      <div id="review-flag" class="review-flag" style="display:none">
        ⚠ requires_review: true — human oversight recommended
      </div>
    </div>
  </div>

  <!-- Right: agent pipeline + log -->
  <div class="right">
    <div class="panel-header">Agent Pipeline</div>

    <div class="agents">
      <div class="agent-row idle" id="agent-retriever">
        <div class="agent-indicator"></div>
        <div class="agent-name">RetrieverAgent</div>
        <div class="agent-time" id="time-retriever">—</div>
      </div>
      <div class="agent-row idle" id="agent-compliance">
        <div class="agent-indicator"></div>
        <div class="agent-name">ComplianceAgent</div>
        <div class="agent-time" id="time-compliance">—</div>
      </div>
      <div class="agent-row idle" id="agent-explanation">
        <div class="agent-indicator"></div>
        <div class="agent-name">ExplanationAgent</div>
        <div class="agent-time" id="time-explanation">—</div>
      </div>
    </div>

    <div class="panel-header" style="border-top:none">Audit Log</div>
    <div class="log-area" id="log-area"></div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-label">Idle</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="scenario-dots">
      <div class="s-dot active" id="dot-0"></div>
      <div class="s-dot" id="dot-1"></div>
      <div class="s-dot" id="dot-2"></div>
    </div>
  </div>

</div>

<script>
const demos = [
  {
    query: "What are the minimum capital requirements under Basel III for commercial banks?",
    regulation: "Basel III · CRR",
    requires_review: false,
    retrieved: [
      { id: "BASEL3_§4.1", score: "0.94" },
      { id: "BASEL3_§6.2", score: "0.89" },
      { id: "CRR_Art.92",  score: "0.81" },
      { id: "ECB_SUP_§3.4",score: "0.76" },
    ],
    compliance_note: "Regulation matched: Basel III · CRR — no personal data detected",
    answer: "Under Basel III, commercial banks must maintain a minimum Common Equity Tier 1 (CET1) ratio of 4.5% of risk-weighted assets, a Tier 1 capital ratio of 6%, and a total capital ratio of 8%. A Capital Conservation Buffer of 2.5% in CET1 is additionally required, bringing the effective minimum CET1 to 7%. Systemically important institutions may face additional surcharges of up to 3.5%.",
    citations: ["Basel III §4.1", "Basel III §6.2", "CRR Art.92"],
  },
  {
    query: "Does GDPR's right to erasure apply to financial transaction records?",
    regulation: "GDPR · PSD2 · BaFin",
    requires_review: true,
    retrieved: [
      { id: "GDPR_Art.17",  score: "0.96" },
      { id: "GDPR_Art.6",   score: "0.91" },
      { id: "PSD2_Art.94",  score: "0.83" },
      { id: "BaFin_§154",   score: "0.77" },
    ],
    compliance_note: "Personal data domain — requires_review: true",
    answer: "The right to erasure under GDPR Article 17 is subject to legal retention obligations. Financial transaction records are typically exempt: AMLD5 mandates a minimum 5-year retention period, and BaFin guidelines require up to 10 years for certain transaction types. Erasure requests for transaction data must be evaluated against applicable retention law before any action is taken.",
    citations: ["GDPR Art.17", "GDPR Art.6", "PSD2 Art.94", "BaFin §154"],
  },
  {
    query: "What position limits apply under MiFID II for commodity derivatives?",
    regulation: "MiFID II · CRR",
    requires_review: false,
    retrieved: [
      { id: "MIFID2_Art.57", score: "0.95" },
      { id: "MIFID2_RTS21",  score: "0.88" },
      { id: "CRR_Art.355",   score: "0.74" },
      { id: "ECB_SUP_§5.1",  score: "0.69" },
    ],
    compliance_note: "Regulation matched: MiFID II · CRR — no personal data detected",
    answer: "Under MiFID II Article 57, competent authorities must establish position limits on commodity derivatives traded on trading venues. Spot-month limits are generally set at 25% of deliverable supply; other-months limits at 25% of open interest. Investment firms must report positions exceeding threshold levels. Non-financial entities hedging commercial risk may qualify for an exemption.",
    citations: ["MiFID II Art.57", "MiFID II RTS 21", "CRR Art.355"],
  },
];

let currentDemo = 0;
let running = false;

function getTs() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}.${String(n.getMilliseconds()).padStart(3,'0').slice(0,2)}`;
}

function addLog(tag, tagClass, msg, val = '') {
  const area = document.getElementById('log-area');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-ts">${getTs()}</span><span class="log-tag ${tagClass}">[${tag}]</span><span class="log-msg">${msg}</span>${val ? `<span class="log-val">${val}</span>` : ''}`;
  area.appendChild(line);
  requestAnimationFrame(() => { line.classList.add('visible'); area.scrollTop = area.scrollHeight; });
}

function setProgress(label, pct) {
  document.getElementById('progress-label').textContent = label;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function setAgent(id, state, time = '—') {
  const row = document.getElementById('agent-' + id);
  const icon = document.getElementById('icon-' + id);
  const timeEl = document.getElementById('time-' + id);
  row.className = 'agent-row ' + state;
  timeEl.textContent = time;
  if (state !== 'idle' && icon) {
    icon.className = 'status-icon ' + (state === 'done' ? 'done' : 'spinner');
    if (state === 'done') icon.textContent = '✓';
  }
}

function showStatus(id, msg) {
  const row = document.getElementById('status-' + id);
  const msgEl = document.getElementById('msg-' + id);
  row.style.display = 'flex';
  msgEl.textContent = msg;
}

function markStatusDone(id, msg) {
  const icon = document.getElementById('icon-' + id);
  const msgEl = document.getElementById('msg-' + id);
  icon.className = 'status-icon done';
  icon.textContent = '✓';
  msgEl.textContent = msg;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeQuery(text) {
  const el = document.getElementById('query-text');
  el.innerHTML = '<span class="cursor"></span>';
  for (let i = 0; i < text.length; i++) {
    await delay(28 + Math.random() * 22);
    el.innerHTML = text.slice(0, i + 1) + '<span class="cursor"></span>';
  }
}

async function streamAnswer(text) {
  const el = document.getElementById('answer-text');
  el.textContent = '';
  const words = text.split(' ');
  for (let i = 0; i < words.length; i++) {
    await delay(45 + Math.random() * 35);
    el.textContent += (i > 0 ? ' ' : '') + words[i];
  }
}

function resetUI() {
  ['retriever','compliance','explanation'].forEach(id => {
    setAgent(id, 'idle');
    const row = document.getElementById('status-' + id);
    if (row) row.style.display = 'none';
    const icon = document.getElementById('icon-' + id);
    if (icon) { icon.className = 'status-icon spinner'; icon.textContent = ''; }
    document.getElementById('time-' + id).textContent = '—';
  });
  document.getElementById('answer-block').style.display = 'none';
  document.getElementById('answer-text').textContent = '';
  document.getElementById('citations').innerHTML = '';
  document.getElementById('review-flag').style.display = 'none';
  document.getElementById('review-flag').className = 'review-flag';
  document.getElementById('log-area').innerHTML = '';
  setProgress('Idle', 0);
}

async function runDemo(d) {
  resetUI();

  // Update dots
  for (let i = 0; i < 3; i++) {
    document.getElementById('dot-' + i).className = 's-dot' + (i === currentDemo ? ' active' : '');
  }

  // Type query
  setProgress('Receiving query', 5);
  addLog('API', 'audit', 'POST /query — JWT verified');
  await typeQuery(d.query);
  await delay(400);

  // ── RetrieverAgent ──
  setAgent('retriever', 'active', '...');
  showStatus('retriever', 'Querying FAISS index...');
  setProgress('RetrieverAgent', 20);
  addLog('RETRIEVER', 'retriever', 'log_decision: ', 'querying FAISS IVF index');
  await delay(800);
  addLog('RETRIEVER', 'retriever', 'embedding query vector');
  await delay(600);
  for (const chunk of d.retrieved) {
    await delay(260);
    addLog('RETRIEVER', 'retriever', `chunk: ${chunk.id}  score=`, chunk.score);
  }
  await delay(300);
  markStatusDone('retriever', `Retrieved ${d.retrieved.length} chunks  ·  top score ${d.retrieved[0].score}`);
  setAgent('retriever', 'done', `${(1.1 + Math.random()*0.4).toFixed(2)}s`);
  setProgress('RetrieverAgent', 38);

  await delay(350);

  // ── ComplianceAgent ──
  setAgent('compliance', 'active', '...');
  showStatus('compliance', 'Analysing regulatory context...');
  setProgress('ComplianceAgent', 50);
  addLog('COMPLIANCE', 'compliance', 'log_decision: ', 'scanning retrieved chunks');
  await delay(700);
  addLog('COMPLIANCE', 'compliance', 'regulation matched: ', d.regulation);
  await delay(500);
  addLog('COMPLIANCE', 'compliance', 'requires_review: ', d.requires_review ? 'TRUE' : 'false');
  await delay(400);
  markStatusDone('compliance', d.compliance_note);
  setAgent('compliance', 'done', `${(0.7 + Math.random()*0.3).toFixed(2)}s`);
  setProgress('ComplianceAgent', 65);

  await delay(350);

  // ── ExplanationAgent ──
  setAgent('explanation', 'active', '...');
  showStatus('explanation', 'Generating cited response...');
  setProgress('ExplanationAgent', 72);
  addLog('EXPLANATION', 'explanation', 'log_decision: ', 'building grounded response');
  await delay(500);
  addLog('EXPLANATION', 'explanation', 'LLM call: ', 'gpt-4o-mini');

  document.getElementById('answer-block').style.display = 'block';
  await streamAnswer(d.answer);

  setProgress('ExplanationAgent', 92);
  await delay(200);
  addLog('EXPLANATION', 'explanation', 'citations attached: ', d.citations.length);
  markStatusDone('explanation', 'Response complete');
  setAgent('explanation', 'done', `${(2.8 + Math.random()*0.7).toFixed(2)}s`);

  // Citations
  const citEl = document.getElementById('citations');
  for (let i = 0; i < d.citations.length; i++) {
    await delay(120);
    const chip = document.createElement('span');
    chip.className = 'cite-chip';
    chip.textContent = d.citations[i];
    citEl.appendChild(chip);
    requestAnimationFrame(() => chip.classList.add('visible'));
  }

  // Review flag
  if (d.requires_review) {
    await delay(200);
    const flag = document.getElementById('review-flag');
    flag.style.display = 'inline-flex';
    requestAnimationFrame(() => flag.classList.add('visible'));
  }

  addLog('AUDIT', 'audit', 'log_decision: response dispatched via SSE');
  setProgress('Complete', 100);
  await delay(300);
  addLog('AUDIT', 'audit', 'query_id: ', 'hashed — PII redacted from log');
}

async function loop() {
  if (running) return;
  running = true;
  while (true) {
    await runDemo(demos[currentDemo]);
    await delay(3800);
    currentDemo = (currentDemo + 1) % demos.length;
  }
}

loop();
</script>
</body>
</html>
